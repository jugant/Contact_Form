<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Premium Contact Form</title>

    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
        font-family: "Poppins", sans-serif;
      }

      body {
        height: 100vh;
        background: radial-gradient(circle at top, #1f2937, #020617);
        display: flex;
        justify-content: center;
        align-items: center;
      }

      .container {
        background: rgba(15, 23, 42, 0.75);
        backdrop-filter: blur(20px);
        padding: 30px;
        border-radius: 18px;
        width: 360px;
        border: 1px solid rgba(255, 255, 255, 0.08);
        box-shadow: 0 20px 60px rgba(0, 0, 0, 0.6);
      }

      h2 {
        text-align: center;
        margin-bottom: 25px;
        color: #e2e8f0;
      }

      .form-group {
        position: relative;
        margin-bottom: 22px;
      }

      input,
      textarea {
        width: 100%;
        padding: 14px 12px;
        border-radius: 10px;
        border: 1px solid rgba(255, 255, 255, 0.1);
        background: rgba(255, 255, 255, 0.04);
        color: #fff;
        outline: none;
      }

      textarea {
        height: 90px;
        resize: none;
      }

      label {
        position: absolute;
        left: 12px;
        top: 14px;
        color: #94a3b8;
        font-size: 14px;
        pointer-events: none;
        transition: 0.3s;
        padding: 0 5px;
      }

      input:focus + label,
      input:not(:placeholder-shown) + label,
      textarea:focus + label,
      textarea:not(:placeholder-shown) + label {
        top: -8px;
        left: 10px;
        font-size: 11px;
        color: #38bdf8;
        background: rgba(15, 23, 42, 1);
        border-radius: 5px;
      }

      button {
        width: 100%;
        padding: 14px;
        border: none;
        border-radius: 10px;
        background: linear-gradient(135deg, #38bdf8, #6366f1);
        color: white;
        font-size: 16px;
        cursor: pointer;
      }

      button:hover {
        transform: translateY(-2px);
      }

      .error {
        color: #f87171;
        font-size: 12px;
      }

      .success {
        color: #4ade80;
        text-align: center;
        margin-top: 10px;
      }
    </style>
  </head>

  <body>
    <div class="container">
      <h2>Contact Us</h2>

      <div class="form-group">
        <input type="text" id="name" placeholder=" " />
        <label>Name</label>
        <div class="error" id="nameError"></div>
      </div>

      <div class="form-group">
        <input type="email" id="email" placeholder=" " />
        <label>Email</label>
        <div class="error" id="emailError"></div>
      </div>

      <div class="form-group">
        <textarea id="address" placeholder=" "></textarea>
        <label>Address</label>
        <div class="error" id="addressError"></div>
      </div>

      <button onclick="validateForm()">Submit</button>
      <div class="success" id="successMsg"></div>
    </div>

    <script>
      async function validateForm() {
        let name = document.getElementById("name").value.trim();
        let email = document.getElementById("email").value.trim();
        let address = document.getElementById("address").value.trim();

        let valid = true;

        document.getElementById("nameError").innerText = "";
        document.getElementById("emailError").innerText = "";
        document.getElementById("addressError").innerText = "";
        document.getElementById("successMsg").innerText = "";

        if (name === "") {
          document.getElementById("nameError").innerText =
            "This field is required";
          valid = false;
        }

        if (email === "") {
          document.getElementById("emailError").innerText =
            "This field is required";
          valid = false;
        } else {
          let pattern = /^[^ ]+@[^ ]+\.[a-z]{2,3}$/;
          if (!email.match(pattern)) {
            document.getElementById("emailError").innerText =
              "Enter valid email";
            valid = false;
          }
        }

        if (address === "") {
          document.getElementById("addressError").innerText =
            "This field is required";
          valid = false;
        }

        if (valid) {
          try {
            let res = await fetch("http://localhost:5000/contact", {
              method: "POST",
              headers: {
                "Content-Type": "application/json",
              },
              body: JSON.stringify({ name, email, address }),
            });
            await fetch(`http://localhost:5000/contact/${id}`, {
              method: "DELETE",
            });

            let data = await res.text();
            document.getElementById("successMsg").innerText = data;
          } catch (err) {
            document.getElementById("successMsg").innerText = "Server error ❌";
          }
        }
      }
    </script>
  </body>
</html>
